<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROJECT PROMETHEUS — AI Data Center Power Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060B15; --bg2:#0A1224;
  --glass:rgba(255,255,255,.045); --glass-2:rgba(255,255,255,.07);
  --brd:rgba(120,170,255,.16); --brd-strong:rgba(120,170,255,.34);
  --blue:#3AA0FF; --cyan:#54D8FF; --green:#37F5A0; --gold:#FFC64B; --violet:#9B8CFF;
  --gray:#64769A; --text:#EAF1FF; --muted:#8A9CC0; --dim:#5A6A88;
  --display:"Chakra Petch",ui-monospace,"SF Mono",-apple-system,sans-serif;
  --kr:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","맑은 고딕",sans-serif;
  --mono:"JetBrains Mono",ui-monospace,"SF Mono",Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--kr);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;line-height:1.6}
.sky{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.sky .neb{position:absolute;inset:-20%;background:radial-gradient(40% 35% at 22% 18%,rgba(58,160,255,.16),transparent 60%),radial-gradient(45% 40% at 82% 30%,rgba(155,140,255,.14),transparent 60%),radial-gradient(50% 45% at 60% 92%,rgba(55,245,160,.10),transparent 60%);animation:drift 26s ease-in-out infinite alternate}
@keyframes drift{to{transform:translate3d(0,-24px,0) scale(1.06)}}
.sky .grid{position:absolute;inset:0;opacity:.5;background-image:linear-gradient(rgba(120,170,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(120,170,255,.05) 1px,transparent 1px);background-size:52px 52px;mask-image:radial-gradient(ellipse 70% 60% at 50% 40%,#000,transparent 95%)}
.stars i{position:absolute;width:2px;height:2px;border-radius:50%;background:#cfe0ff;animation:tw 4s ease-in-out infinite}
@keyframes tw{0%,100%{opacity:.15}50%{opacity:.8}}
.app{position:relative;z-index:1}

/* HUD */
.hud{position:relative;z-index:40;backdrop-filter:blur(16px);background:linear-gradient(180deg,rgba(6,11,21,.94),rgba(6,11,21,.66));border-bottom:1px solid var(--brd)}
.hud-in{max-width:1180px;margin:0 auto;padding:12px 24px;display:flex;justify-content:center}
.brand .kick{font-family:var(--mono);font-size:11px;letter-spacing:.34em;color:var(--cyan);text-transform:uppercase}
.brand h1{font-family:var(--display);font-weight:700;font-size:clamp(18px,2.4vw,26px);letter-spacing:.13em;background:linear-gradient(92deg,#fff,var(--cyan) 60%,var(--violet));-webkit-background-clip:text;background-clip:text;color:transparent;margin-top:2px}
.brand .sub{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.16em;margin-top:2px}
.stats{display:flex;gap:12px;align-items:stretch}
.stat{background:var(--glass);border:1px solid var(--brd);border-radius:12px;padding:9px 14px;min-width:112px}
.stat .l{font-family:var(--kr);font-size:11px;font-weight:700;letter-spacing:0;color:var(--muted);text-transform:none}
.stat .v{font-family:var(--display);font-weight:700;font-size:18px;margin-top:3px;letter-spacing:.03em}
.stat.mission .v{font-family:var(--kr);font-size:13.5px;font-weight:700;color:var(--cyan)}
.stat.next .v{font-family:var(--kr);font-size:13.5px;font-weight:700;color:var(--muted)}
.bar{margin-top:7px;height:6px;border-radius:6px;background:rgba(255,255,255,.08);overflow:hidden;position:relative}
.bar>i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--blue),var(--green) 60%,var(--gold));box-shadow:0 0 12px rgba(84,216,255,.5);transition:width 1s cubic-bezier(.2,.8,.2,1)}

/* toolbar */
.toolbar{max-width:1180px;margin:16px auto 0;padding:0 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.seg{display:flex;background:var(--glass);border:1px solid var(--brd);border-radius:11px;padding:3px}
.seg button{font-family:var(--mono);font-size:12px;letter-spacing:.1em;color:var(--muted);background:none;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;transition:.2s}
.navbar{border-bottom:1px solid var(--brd);background:linear-gradient(180deg,rgba(12,20,40,.55),rgba(6,11,21,0))}
.navbar-in{max-width:1180px;margin:0 auto;padding:4px 18px;display:flex;gap:4px;flex-wrap:wrap;align-items:center;overflow-x:auto}
.brandmark{display:flex;align-items:center;gap:6px;cursor:pointer;padding:10px 14px 10px 6px;margin-right:6px;border-right:1px solid var(--brd)}
.bm-bolt{font-size:20px;filter:drop-shadow(0 0 6px rgba(84,216,255,.7))}
.bm-txt{font-family:var(--display);font-weight:700;font-size:18px;letter-spacing:.02em;background:linear-gradient(92deg,var(--cyan),var(--violet));-webkit-background-clip:text;background-clip:text;color:transparent;white-space:nowrap}
.navb{position:relative;display:flex;align-items:center;gap:8px;background:none;border:none;color:var(--muted);font-family:var(--kr);font-weight:800;font-size:15.5px;padding:15px 18px;cursor:pointer;border-radius:10px;transition:.18s;white-space:nowrap}
.navb .ni{font-size:19px}
.navb:hover{color:#fff;background:var(--glass)}
.navb.on{color:#fff}
.navb.on::after{content:"";position:absolute;left:16px;right:16px;bottom:5px;height:3px;border-radius:3px;background:linear-gradient(92deg,var(--cyan),var(--violet));box-shadow:0 0 10px rgba(84,216,255,.5)}
@media(max-width:560px){.navb{font-size:13.5px;padding:13px 12px;gap:5px}.navb .ni{font-size:16px}}
.seg button.on{background:linear-gradient(92deg,var(--blue),var(--violet));color:#fff}
.tbtn{font-family:var(--kr);font-size:12.5px;font-weight:600;color:var(--muted);background:var(--glass);border:1px solid var(--brd);padding:9px 14px;border-radius:11px;cursor:pointer;transition:.2s}
.tbtn:hover{color:#fff;border-color:var(--brd-strong)}
.tbtn.active{color:var(--gold);border-color:rgba(255,198,75,.4);background:rgba(255,198,75,.08)}
.tbtn .k{font-family:var(--mono);font-size:11px}
.spacer{flex:1}

.intro{max-width:1180px;margin:16px auto 4px;padding:0 24px;text-align:center}
.intro p{color:var(--text);font-size:14.5px;font-weight:500;max-width:46em;margin:0 auto}
.legend{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:12px;font-family:var(--kr);font-size:12.5px;font-weight:600;color:var(--text)}
.legend b{display:inline-flex;align-items:center;gap:6px;font-weight:400}
.dotc{width:9px;height:9px;border-radius:50%}
.dotc.gray{background:var(--gray)}.dotc.blue{background:var(--blue)}.dotc.green{background:var(--green)}.dotc.gold{background:var(--gold)}.dotc.fog{background:#2a3550;box-shadow:0 0 0 2px rgba(255,255,255,.05)}

/* ===== TREE ===== */
.tree{position:relative;max-width:1180px;margin:20px auto 90px;padding:30px 24px 0}
.tree.hidden,.map.hidden{display:none}
.tree::before{content:"";position:absolute;left:50%;top:30px;bottom:0;width:3px;transform:translateX(-50%);background:rgba(120,170,255,.12);border-radius:3px}
.rail-lit{position:absolute;left:50%;top:30px;width:3px;transform:translateX(-50%);height:0;border-radius:3px;z-index:1;background:linear-gradient(180deg,var(--gold),var(--green) 45%,var(--blue));background-size:100% 260%;animation:flow 3.4s linear infinite;box-shadow:0 0 16px rgba(84,216,255,.5);transition:height 1s}
@keyframes flow{to{background-position:0 260%}}
.row{position:relative;display:grid;grid-template-columns:1fr 64px 1fr;align-items:center;margin:8px 0;z-index:2}
.hub{grid-column:2;justify-self:center;position:relative;width:46px;height:46px;border-radius:14px;display:grid;place-items:center;font-size:20px;z-index:3;cursor:pointer;background:var(--bg2);border:2px solid var(--gray);transition:transform .25s,box-shadow .3s;transform:rotate(45deg)}
.hub>span{transform:rotate(-45deg)}
.hub:hover{transform:rotate(45deg) scale(1.08)}
.row.completed .hub{border-color:var(--gold);box-shadow:0 0 22px rgba(255,198,75,.55)}
.row.current .hub{border-color:var(--cyan);box-shadow:0 0 26px rgba(84,216,255,.6);animation:beat 1.8s ease-in-out infinite}
@keyframes beat{0%,100%{box-shadow:0 0 20px rgba(84,216,255,.5)}50%{box-shadow:0 0 34px rgba(84,216,255,.85)}}
.row.next .hub{border-color:var(--violet);border-style:dashed}
.row.locked .hub{border-color:#2b3652;color:#46557a;background:#0a1020}
.row.master .hub{width:58px;height:58px;border-radius:16px;font-size:26px;border-color:var(--gold);background:radial-gradient(circle,rgba(255,198,75,.18),var(--bg2));box-shadow:0 0 30px rgba(255,198,75,.4)}
.card-wrap{position:relative}
.row.left .card-wrap{grid-column:1;padding-right:26px}
.row.right .card-wrap{grid-column:3;padding-left:26px}
.row .card-wrap::before{content:"";position:absolute;top:50%;width:26px;height:2px;background:var(--brd)}
.row.left .card-wrap::before{right:0}.row.right .card-wrap::before{left:0}
.row.completed .card-wrap::before{background:var(--gold);box-shadow:0 0 8px var(--gold)}
.row.current .card-wrap::before{background:var(--cyan);box-shadow:0 0 8px var(--cyan)}
.card{position:relative;background:var(--glass);border:1px solid var(--brd);border-radius:16px;padding:15px 17px;cursor:pointer;transition:transform .28s,border-color .3s;overflow:hidden}
.card:hover{transform:translateY(-3px);border-color:var(--brd-strong)}
.card .top{display:flex;align-items:center;gap:11px}
.card .ico{font-size:22px;filter:drop-shadow(0 0 8px rgba(84,216,255,.4))}
.card .names{flex:1;min-width:0}
.card .n-kr{font-family:var(--kr);font-weight:700;font-size:16px}
.card .n-en{font-family:var(--mono);font-size:10px;letter-spacing:.16em;color:var(--dim);text-transform:uppercase;margin-top:1px}
.tierbadge{font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.1em;padding:4px 8px;border-radius:6px;text-transform:uppercase;white-space:nowrap}
.pbar{margin-top:12px;height:7px;border-radius:6px;background:rgba(255,255,255,.08);overflow:hidden}
.pbar>i{display:block;height:100%;border-radius:6px;transition:width .8s cubic-bezier(.2,.8,.2,1)}
.card .meta{display:flex;justify-content:space-between;align-items:center;margin-top:9px}
.card .pct{font-family:var(--display);font-weight:700;font-size:15px}
.card .who{font-family:var(--mono);font-size:11px;color:var(--muted)}
.card .frag{display:flex;gap:4px;margin-top:10px;flex-wrap:wrap}
.frag .f{width:9px;height:9px;border-radius:3px;background:rgba(255,255,255,.1)}
.frag .f.on{background:var(--tc)}
.card.gray{--tc:var(--gray)}.card.blue{--tc:var(--blue)}.card.green{--tc:var(--green)}.card.gold{--tc:var(--gold)}
.pbar>i{background:linear-gradient(90deg,var(--tc),transparent)}
.card .pct{color:var(--tc)}
.tierbadge{background:color-mix(in srgb,var(--tc,var(--cyan)) 20%,transparent);color:var(--tc,var(--cyan));border:1px solid color-mix(in srgb,var(--tc,var(--cyan)) 40%,transparent)}
.card.gold{border-color:rgba(255,198,75,.35);box-shadow:0 0 26px rgba(255,198,75,.12)}
.delnode{position:absolute;top:-8px;right:-8px;width:24px;height:24px;border-radius:50%;background:#e0507a;color:#fff;border:none;font-size:13px;cursor:pointer;display:none;z-index:5;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.editing .delnode{display:grid;place-items:center}
.fog{position:relative;background:linear-gradient(180deg,rgba(20,28,48,.7),rgba(12,18,34,.7));border:1px dashed rgba(120,140,190,.22);border-radius:16px;padding:18px 17px;cursor:pointer;overflow:hidden;transition:transform .28s,border-color .3s}
.fog:hover{transform:translateY(-2px);border-color:rgba(155,140,255,.4)}
.fog::after{content:"";position:absolute;inset:0;background:radial-gradient(60% 60% at 30% 30%,rgba(120,140,190,.12),transparent),repeating-linear-gradient(115deg,rgba(255,255,255,.02) 0 8px,transparent 8px 16px);animation:fogmove 12s linear infinite;pointer-events:none}
@keyframes fogmove{to{background-position:120px 0,0 0}}
.fog .top{display:flex;align-items:center;gap:11px;position:relative;z-index:2}
.fog .lock{font-size:20px;opacity:.7}
.fog .ftitle{font-family:var(--mono);font-weight:700;font-size:13px;letter-spacing:.12em;color:#9fb0d6}
.fog .fsub{font-family:var(--mono);font-size:10px;color:#5f6f92;letter-spacing:.14em;margin-top:6px;position:relative;z-index:2}
.fog.teaser{border-color:rgba(155,140,255,.34)}.fog.teaser .ftitle{color:var(--violet)}
.addnode{max-width:1180px;margin:6px auto 0;text-align:center}
.addnode button{font-family:var(--kr);font-weight:700;font-size:13px;color:var(--cyan);background:rgba(84,216,255,.08);border:1px dashed rgba(84,216,255,.4);border-radius:12px;padding:12px 22px;cursor:pointer}

/* ===== MAP ===== */
.map{position:relative;max-width:1180px;margin:16px auto 90px;padding:0 24px}
.mapframe{position:relative;border:1px solid var(--brd);border-radius:20px;overflow:hidden;background:radial-gradient(120% 90% at 50% 0%,rgba(20,32,60,.6),rgba(6,10,20,.9))}
.mapframe::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(84,216,255,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(84,216,255,.06) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.mapboard{position:relative;width:100%}
.mapsvg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1}
.tile{position:absolute;transform:translate(-50%,-50%);width:170px;z-index:2}
.tile .inner{position:relative;border-radius:14px;padding:13px 14px;cursor:pointer;transition:transform .25s,box-shadow .3s;background:var(--glass);border:1px solid var(--brd);backdrop-filter:blur(6px)}
.tile .inner:hover{transform:translateY(-3px)}
.tile .th{display:flex;align-items:center;gap:8px}
.tile .th .i{font-size:19px}
.tile .th .nm{font-family:var(--kr);font-weight:700;font-size:14px;line-height:1.2}
.tile .en2{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--dim);text-transform:uppercase;margin-top:2px}
.tile .ring{position:absolute;top:10px;right:12px;font-family:var(--display);font-weight:700;font-size:13px}
.tile .tb{margin-top:9px;height:5px;border-radius:5px;background:rgba(255,255,255,.08);overflow:hidden}
.tile .tb>i{display:block;height:100%;border-radius:5px}
.tile.gray{--tc:var(--gray)}.tile.blue{--tc:var(--blue)}.tile.green{--tc:var(--green)}.tile.gold{--tc:var(--gold)}
.tile .tb>i{background:var(--tc)}.tile .ring{color:var(--tc)}
.tile.completed .inner{border-color:rgba(255,198,75,.4);box-shadow:0 0 22px rgba(255,198,75,.18)}
.tile.current .inner{border-color:var(--cyan);box-shadow:0 0 24px rgba(84,216,255,.4);animation:beat 1.8s ease-in-out infinite}
.tile.fogged .inner{background:rgba(12,18,34,.8);border:1px dashed rgba(120,140,190,.25);filter:blur(.3px)}
.tile.fogged .nm,.tile.fogged .en2{color:#4a5a7c}
.tile.core{width:190px;z-index:3}
.tile.core .inner{border-color:rgba(255,198,75,.5);background:radial-gradient(circle,rgba(255,198,75,.14),rgba(12,18,34,.9));box-shadow:0 0 34px rgba(255,198,75,.3)}
.maphint{text-align:center;font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:14px;letter-spacing:.1em}

/* ===== MODAL ===== */
.scrim{position:fixed;inset:0;z-index:60;background:rgba(4,8,16,.72);backdrop-filter:blur(8px);display:grid;place-items:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .3s}
.scrim.open{opacity:1;pointer-events:auto}
.modal{width:min(600px,100%);max-height:90vh;overflow:auto;border-radius:22px;background:linear-gradient(180deg,rgba(16,24,44,.98),rgba(9,14,28,.98));border:1px solid var(--brd-strong);box-shadow:0 30px 90px rgba(0,0,0,.6);transform:translateY(18px) scale(.98);transition:transform .34s cubic-bezier(.2,.9,.2,1)}
.scrim.open .modal{transform:none}
.m-head{padding:22px 24px 16px;border-bottom:1px solid var(--brd);position:relative;overflow:hidden}
.m-head .aura{position:absolute;inset:0;opacity:.5;pointer-events:none;background:radial-gradient(80% 120% at 100% 0%,color-mix(in srgb,var(--tc,var(--cyan)) 26%,transparent),transparent 60%)}
.m-top{display:flex;align-items:center;gap:13px;position:relative;z-index:2}
.m-ico{font-size:32px}
.m-kr{font-family:var(--kr);font-weight:700;font-size:22px}
.m-en{font-family:var(--kr);font-size:12.5px;font-weight:600;color:var(--muted);letter-spacing:.02em}
.m-badge{margin-left:auto}
.m-prog{margin-top:16px;position:relative;z-index:2}
.m-prog .r2{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:7px;letter-spacing:.08em}
.m-prog .pv{font-family:var(--display);font-weight:700;font-size:16px;color:var(--tc,var(--cyan))}
.m-prog .track{height:9px;border-radius:8px;background:rgba(255,255,255,.08);overflow:hidden}
.m-prog .track>i{display:block;height:100%;background:linear-gradient(90deg,var(--tc,var(--cyan)),#fff4);border-radius:8px;transition:width .7s}
.m-body{padding:20px 24px 26px}
.m-metaR{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:16px}
.m-meta{flex:1 1 30%;background:var(--glass);border:1px solid var(--brd);border-radius:11px;padding:10px 12px}
.m-meta .l{font-family:var(--kr);font-size:12px;font-weight:700;letter-spacing:0;color:var(--muted);text-transform:none}
.m-meta .v{font-family:var(--kr);font-weight:700;font-size:15.5px;margin-top:4px;color:#fff}
.m-meta input{width:100%;background:transparent;border:none;color:#fff;font-family:var(--kr);font-weight:700;font-size:15px;margin-top:3px;border-bottom:1px solid var(--brd)}
.sec-t{font-family:var(--kr);font-size:13px;font-weight:800;letter-spacing:.02em;color:var(--cyan);text-transform:none;margin:18px 0 10px;display:flex;align-items:center;gap:10px}
.sec-t::after{content:"";flex:1;height:1px;background:var(--brd)}
.sec-t .add{font-family:var(--kr);font-size:12.5px;font-weight:700;color:var(--cyan);cursor:pointer;letter-spacing:0;text-transform:none;border:1px solid var(--brd);padding:4px 11px;border-radius:8px}
.desc{color:var(--muted);font-size:14px}
textarea.desc{width:100%;background:var(--glass);border:1px solid var(--brd);border-radius:10px;color:var(--text);padding:9px;font-family:var(--kr);font-size:13.5px;resize:vertical;min-height:54px}

/* asset rows */
.assets{display:grid;gap:8px}
.asset{display:flex;align-items:center;gap:11px;background:var(--glass);border:1px solid var(--brd);border-radius:11px;padding:10px 13px}
.asset .box{width:24px;height:24px;border-radius:7px;display:grid;place-items:center;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;transition:.2s}
.asset.done .box{background:var(--green);color:#04140c;box-shadow:0 0 12px rgba(55,245,160,.4)}
.asset.todo .box{background:rgba(255,255,255,.06);border:1px solid var(--brd);color:var(--dim)}
.asset.ro .box{cursor:not-allowed;opacity:.6}
.asset .an{font-family:var(--kr);font-size:14px;font-weight:600}
.asset.done .an{color:var(--text)}.asset.todo .an{color:var(--muted)}
.asset .sp{flex:1}
.asset .lk{font-family:var(--mono);font-size:11px;padding:5px 10px;border-radius:8px;border:1px solid var(--brd);color:var(--cyan);cursor:pointer;text-decoration:none;white-space:nowrap}
.asset .lk.empty{color:var(--dim)}
.asset .lk:hover{border-color:var(--brd-strong)}
.asset .del{color:#e0507a;cursor:pointer;font-size:14px;padding:0 4px}

/* companies */
.co-list{display:grid;gap:9px}
.co{display:flex;align-items:center;gap:11px;background:var(--glass-2);border:1px solid var(--brd);border-radius:12px;padding:11px 14px;cursor:pointer;transition:.2s}
.co:hover{border-color:var(--brd-strong);transform:translateX(2px)}
.co .flag{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;font-size:14px;background:rgba(255,255,255,.06);flex-shrink:0}
.co.done .flag{background:var(--gold);color:#241500}
.co .cn{font-family:var(--kr);font-weight:700;font-size:14.5px}
.co .cprog{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:1px}
.co.done .cprog{color:var(--gold)}
.co .arrow{margin-left:auto;color:var(--dim);font-family:var(--mono)}
.co .del{margin-left:auto;color:#e0507a;font-size:15px;padding:0 4px}
.links{display:flex;flex-wrap:wrap;gap:8px}
.lchip{font-family:var(--kr);font-size:13.5px;font-weight:600;padding:9px 14px;border-radius:10px;background:var(--glass-2);border:1px solid var(--brd);color:var(--cyan);text-decoration:none;display:inline-flex;align-items:center;gap:7px}
.lchip:hover{border-color:var(--brd-strong)}
.lchip .del{color:#e0507a;cursor:pointer}
.m-actions{display:flex;gap:10px;margin-top:22px;flex-wrap:wrap}
.btn{flex:1;min-width:150px;text-align:center;font-family:var(--kr);font-weight:700;font-size:14px;padding:13px;border-radius:12px;cursor:pointer;text-decoration:none;border:1px solid var(--brd);background:var(--glass-2);color:var(--text);transition:.2s}
.btn:hover{transform:translateY(-2px);border-color:var(--brd-strong)}
.btn.primary{background:linear-gradient(92deg,var(--blue),var(--violet));border:none;box-shadow:0 8px 24px rgba(58,160,255,.3)}
.btn.gold{background:linear-gradient(92deg,var(--gold),#ff9e3d);color:#241500;border:none}
.m-close,.m-back{position:absolute;top:14px;width:34px;height:34px;border-radius:9px;border:1px solid var(--brd);background:var(--glass);color:var(--muted);font-size:16px;cursor:pointer;display:grid;place-items:center;z-index:5}
.m-close{right:16px}.m-back{left:16px}
.m-close:hover,.m-back:hover{color:#fff;border-color:var(--brd-strong)}
.locknote{text-align:center;padding:22px 10px;color:var(--muted)}
.locknote .big{font-size:38px;margin-bottom:8px}
.locknote .kk{font-family:var(--mono);color:var(--violet);font-size:12px;letter-spacing:.1em;margin-top:8px}

/* Mission complete */
.mc{position:fixed;inset:0;z-index:80;display:grid;place-items:center;pointer-events:none;opacity:0;transition:opacity .4s}
.mc.show{opacity:1;pointer-events:auto}
.mc .veil{position:absolute;inset:0;background:radial-gradient(circle at 50% 45%,rgba(10,18,36,.75),rgba(4,7,14,.95))}
.mc .core{position:relative;text-align:center;transform:scale(.8);transition:transform .6s cubic-bezier(.2,1.4,.4,1)}
.mc.show .core{transform:scale(1)}
.mc .ring{width:0;height:0;margin:0 auto 6px;border-radius:50%;border:2px solid var(--gold);box-shadow:0 0 40px var(--gold);animation:ring 1.1s ease-out forwards}
@keyframes ring{0%{width:0;height:0;opacity:1}100%{width:220px;height:220px;opacity:0;margin-bottom:-214px}}
.mc .label{font-family:var(--display);font-weight:700;font-size:clamp(28px,6vw,56px);letter-spacing:.14em;background:linear-gradient(92deg,#fff,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 40px rgba(255,198,75,.4)}
.mc .sctr{font-family:var(--kr);font-weight:700;font-size:clamp(20px,4vw,32px);color:var(--gold);margin-top:6px}
.mc .tag{font-family:var(--mono);font-size:12px;letter-spacing:.3em;color:var(--muted);margin-top:14px;text-transform:uppercase}
.mc .hint{font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:26px;letter-spacing:.12em}
.pcl{position:absolute;top:50%;left:50%;width:8px;height:8px;border-radius:2px;pointer-events:none}
footer{position:relative;z-index:1;text-align:center;padding:26px;font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.14em}
footer b{color:var(--muted);font-weight:400}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);z-index:90;background:rgba(16,24,44,.96);border:1px solid var(--brd-strong);border-radius:12px;padding:12px 20px;font-size:13.5px;color:var(--text);opacity:0;transition:.3s;pointer-events:none;box-shadow:0 12px 40px rgba(0,0,0,.5)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:760px){
  .hud-in{grid-template-columns:1fr}.stats{overflow-x:auto;padding-bottom:4px}.stat{min-width:104px}
  .tree{padding:20px 14px 0}.tree::before,.rail-lit{left:32px}
  .row{grid-template-columns:64px 1fr;gap:4px}.hub{grid-column:1}
  .row.left .card-wrap,.row.right .card-wrap{grid-column:2;padding:0 0 0 20px}
  .row .card-wrap::before{left:0!important;right:auto!important}
}
/* TIMELINE */
.timeline{max-width:1180px;margin:16px auto 90px;padding:0 24px}
.timeline.hidden{display:none}
.tl-summary{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.tl-sum{background:var(--glass);border:1px solid var(--brd);border-radius:12px;padding:11px 16px;min-width:120px}
.tl-sum .l{font-family:var(--mono);font-size:9px;letter-spacing:.16em;color:var(--dim);text-transform:uppercase}
.tl-sum .v{font-family:var(--kr);font-weight:700;font-size:15px;margin-top:3px}
.tl-inner{border:1px solid var(--brd);border-radius:18px;overflow:hidden;background:radial-gradient(120% 90% at 50% 0%,rgba(20,32,60,.5),rgba(6,10,20,.85))}
.tlwrap{display:flex}
.tllabels{flex:0 0 150px;background:rgba(8,13,26,.75);border-right:1px solid var(--brd);z-index:3}
.tlscroll{flex:1;overflow-x:auto}
.tltrack{position:relative}
.tl-axis-sp{height:36px}
.tllab{height:52px;display:flex;flex-direction:column;justify-content:center;padding:0 13px;border-bottom:1px solid rgba(120,170,255,.06);cursor:pointer}
.tllab:hover{background:rgba(84,216,255,.05)}
.tllab .nm{font-family:var(--kr);font-weight:700;font-size:13px;display:flex;align-items:center;gap:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tllab .dd{font-family:var(--mono);font-size:10px;margin-top:3px;display:flex;gap:6px;align-items:center}
.tl-axis{position:absolute;top:0;left:0;height:36px;border-bottom:1px solid var(--brd)}
.tl-mtick{position:absolute;top:0;height:36px;display:flex;align-items:center;font-family:var(--mono);font-size:10px;color:var(--dim);padding-left:6px;border-left:1px solid rgba(120,170,255,.10)}
.tl-grid{position:absolute;top:36px;bottom:0;width:1px;background:rgba(120,170,255,.07)}
.tl-today{position:absolute;top:30px;bottom:0;width:2px;background:linear-gradient(var(--cyan),transparent);box-shadow:0 0 10px var(--cyan);z-index:4}
.tl-today::before{content:"TODAY";position:absolute;top:-13px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:8px;letter-spacing:.1em;color:var(--cyan);white-space:nowrap}
.tlrow{position:absolute;height:52px;left:0;right:0;border-bottom:1px solid rgba(120,170,255,.06)}
.tlbar{position:absolute;top:12px;height:28px;border-radius:8px;cursor:pointer;overflow:hidden;border:1px solid var(--tc);background:color-mix(in srgb,var(--tc) 16%,transparent);display:flex;align-items:center;transition:transform .2s}
.tlbar:hover{transform:translateY(-1px);box-shadow:0 0 14px color-mix(in srgb,var(--tc) 40%,transparent)}
.tlbar>i{position:absolute;left:0;top:0;bottom:0;background:color-mix(in srgb,var(--tc) 44%,transparent)}
.tlbar span{position:relative;z-index:2;font-family:var(--mono);font-size:10px;color:#fff;padding:0 8px;white-space:nowrap}
.tlbar.gray{--tc:var(--gray)}.tlbar.blue{--tc:var(--blue)}.tlbar.green{--tc:var(--green)}.tlbar.gold{--tc:var(--gold)}
.tlbar.late{--tc:#ff6b8a;border-style:dashed}
.tlflag{position:absolute;top:9px;font-size:13px;transform:translateX(-50%);z-index:3;filter:drop-shadow(0 0 4px rgba(255,198,75,.6))}
.tl-empty{padding:44px 20px;text-align:center;color:var(--muted)}
.tl-empty .kk{font-family:var(--mono);color:var(--cyan);font-size:12px;margin-top:8px}
.ddbadge{font-family:var(--mono);font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:5px}
/* ETF & PICKS */
.etf.hidden,.picks.hidden{display:none}
.etf,.picks{max-width:1180px;margin:16px auto 90px;padding:0 24px}
.panel{background:var(--glass);border:1px solid var(--brd);border-radius:20px;padding:22px 22px 26px;backdrop-filter:blur(10px)}
.phead{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:16px}

.ptitle input{font:inherit;background:transparent;border:none;border-bottom:1px solid var(--brd);color:#fff}
.psub{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.1em;margin-top:3px}
.pbtns{display:flex;gap:8px;flex-wrap:wrap}
.cfgrow{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.cfg{display:flex;flex-direction:column;gap:5px}.cfg.grow{flex:1;min-width:220px}
.cfg label{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase}

.sumc{background:var(--bg2);border:1px solid var(--brd);border-radius:13px;padding:14px 16px}

.sumc .v{font-family:var(--display);font-weight:700;font-size:21px;margin-top:5px}
.chart{width:100%;display:block;margin:6px 0 18px}
.tablewrap{overflow-x:auto}
.htable{width:100%;border-collapse:collapse;font-size:13px;min-width:560px}
.htable th{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;text-align:left;padding:9px 10px;border-bottom:1px solid var(--brd)}
.htable td{padding:9px 10px;border-bottom:1px solid rgba(120,170,255,.08)}
.htable td.num,.htable th.num{text-align:right;font-family:var(--mono)}
.htable td.mono2{font-family:var(--mono);color:var(--muted);font-size:12px}
.htable input{background:var(--bg2);border:1px solid var(--brd);border-radius:7px;color:var(--text);padding:5px 8px;font-family:var(--mono);font-size:12px;width:100%}
.htable td.num input{text-align:right}
.htable tfoot td{font-weight:700;border-top:1px solid var(--brd);border-bottom:none;font-family:var(--mono)}
.foot2{margin-top:16px;font-size:12px;color:var(--muted);line-height:1.7}
.foot2 code{font-family:var(--mono);background:var(--bg2);padding:2px 7px;border-radius:6px;color:var(--cyan);font-size:11.5px}
.pickgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:14px}
.pick{position:relative;background:var(--bg2);border:1px solid var(--brd);border-radius:15px;padding:18px 18px 16px;overflow:hidden}
.pick::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(var(--cyan),var(--violet))}
.prank{position:absolute;top:12px;right:14px;font-family:var(--display);font-weight:700;font-size:13px;color:var(--dim)}
.phd{display:flex;justify-content:space-between;align-items:center}
.pmem{font-family:var(--kr);font-weight:700;font-size:13px;color:var(--cyan)}
.pmem input{background:transparent;border:none;border-bottom:1px solid var(--brd);color:var(--cyan);font:inherit;width:80px}
.pco{font-family:var(--kr);font-weight:800;font-size:18px;margin-top:8px;letter-spacing:-.01em}
.pco input{background:transparent;border:none;border-bottom:1px solid var(--brd);color:#fff;font:inherit;width:110px}
.pcode{font-family:var(--mono);font-size:11px;color:var(--dim);font-weight:400}
.pret{font-family:var(--display);font-weight:700;font-size:30px;margin:8px 0}
.pmeta,.pprice{display:flex;justify-content:space-between;gap:8px;font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-top:6px;flex-wrap:wrap;align-items:center}
.pmeta input,.pprice input{background:var(--glass);border:1px solid var(--brd);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:11px;padding:3px 6px}
.dchip{background:rgba(84,216,255,.14);color:var(--cyan);padding:2px 8px;border-radius:6px}
.pnote{margin-top:10px;font-size:12.5px;color:var(--muted);border-top:1px solid var(--brd);padding-top:10px}
.mktchip{font-family:var(--kr);font-weight:800;font-size:10.5px;padding:2px 8px;border-radius:6px;border:1px solid}
.mktchip.kospi{color:var(--cyan);border-color:rgba(84,216,255,.5);background:rgba(84,216,255,.1)}

.mktbtn{font-family:var(--kr);font-weight:800;font-size:10.5px;padding:3px 9px;border-radius:6px;border:1px solid var(--brd);background:var(--glass-2);color:var(--muted);cursor:pointer}
.mktbtn.kospi{color:var(--cyan);border-color:rgba(84,216,255,.5)}
.mktbtn.kosdaq{color:var(--gold);border-color:rgba(255,198,75,.5)}
.pfund{display:flex;gap:12px;flex-wrap:wrap;margin-top:9px;font-family:var(--mono);font-size:11.5px;color:var(--text)}

.pfund input{background:var(--bg2);border:1px solid var(--brd);border-radius:6px;color:#fff;padding:3px 5px;font-family:var(--mono);font-size:11px}

.qpickgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.qpick{background:var(--glass);border:1px solid var(--brd);border-radius:14px;padding:15px 16px}
.qp-h{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.qp-rank{font-family:var(--display);font-weight:800;font-size:14px;color:var(--muted);flex:none}

.qp-ret{font-family:var(--display);font-weight:800;font-size:20px;flex:none}
.qp-barlab{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-bottom:5px}

#legendBar{max-width:1180px;margin:10px auto 0;padding:0 24px}

.mf .datepick,.mform .datepick{width:100%}

.mc-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}

.tt-scroll{overflow-x:auto}
.timetable{min-width:720px;display:flex;flex-direction:column;gap:4px}
.tt-row{display:grid;grid-template-columns:150px repeat(12,1fr);gap:3px;align-items:stretch;cursor:pointer}

function normalize(st){

  if(!st.meta) st.meta=clone(META); st.meta.opCode=st.meta.opCode||""; st.meta.writeCode=st.meta.writeCode||""; st.meta.currentPin=st.meta.currentPin||""; st.meta.topic=st.meta.topic||"";

  st.schedule.forEach(e=>{ e.company=e.company||""; e.cat=e.cat||"월별"; e.presenter=e.presenter||""; });
  if(!st.etfTrack) st.etfTrack=[];
  if(!st.board) st.board=clone(SEED.board); st.board.forEach(p=>{ p.links=p.links||[]; p.comments=p.comments||[]; p.pinned=!!p.pinned; p.id=p.id||("p"+Date.now().toString(36)+Math.random().toString(36).slice(2,6)); });
  if(!st.members) st.members=clone(SEED.members); st.members.forEach(m=>{ m.id=m.id||("m"+Date.now().toString(36)+Math.random().toString(36).slice(2,6)); m.pw=m.pw||""; });
  if(!st.feed) st.feed=clone(SEED.feed||[]);
  st.feed.forEach(f=>{ f.company=f.company||""; f.sector=f.sector||""; });
  st.sectors.forEach(s=>{
    s.links=s.links||[]; s.start=s.start||""; s.deadline=s.deadline||""; s.open=s.open||false; s.children=s.children||[]; s.group=s.group||"";
    s.trade=s.trade||{source:"",url:"",kpis:[]}; s.trade.kpis=s.trade.kpis||[];
    s.sectorAssets=s.sectorAssets||[]; s.companies=s.companies||[];
    s.companies.forEach(c=>{ c.deadline=c.deadline||""; c.uid=c.uid||uid(); c.code=c.code||""; c.owner=c.owner||""; c.pw=c.pw||""; c.items=c.items||[];
      if(c.assets){ if(c.done===undefined) c.done=c.assets.length>0&&c.assets.every(a=>a.done); c.assets.forEach(a=>{ if(a.url) c.items.push({cat:a.name,title:a.name,date:"",url:a.url}); }); delete c.assets; }
      if(c.done===undefined) c.done=false; });
  });
  if(!st.etf) st.etf=clone(SEED.etf);
  else { st.etf.holdings=st.etf.holdings||[]; st.etf.series=st.etf.series||[]; st.etf.csvUrl=st.etf.csvUrl||""; st.etf.capital=st.etf.capital||0; st.etf.inception=st.etf.inception||""; st.etf.name=st.etf.name||"POWER RESEARCH ETF"; }

  return st;
}

function coVolts(c){ return CORE_CATS.filter(cat=> (c.items||[]).some(it=>it.cat===cat)).length; }
function voltHTML(n){ let h=""; for(let k=0;k<3;k++) h+=`<span class="volt ${k<n?"on":"off"}">⚡</span>`; return h; }
function totals(s){ let d=0,t=0; s.sectorAssets.forEach(a=>{t++;if(a.done)d++;}); s.companies.forEach(c=>{t++;if(c.done)d++;}); return {d,t}; }
function prog(s){ const {d,t}=totals(s); return t?Math.round(d/t*100):0; }
const tierOf=p=> p>=100?"gold": p>=67?"green": p>=34?"blue":"gray";
const TIERL={gray:"착수",blue:"진행",green:"고지 근접",gold:"정복 완료"};
function frontier(){ const i=S().findIndex(s=>prog(s)<100); return i===-1?S().length:i; }
function curIdx(){
  if(state.meta&&state.meta.currentPin){ const i=S().findIndex(s=>s.id===state.meta.currentPin); if(i>=0) return i; }
  const t=today0(); const j=S().findIndex(s=>{ const a=parseD(s.start),b=parseD(s.deadline); return a&&b&&t>=a&&t<=b; }); if(j>=0) return j;
  const f=frontier(); return f<S().length?f:Math.max(0,S().length-1);
}
function sortSectors(){ state.sectors.sort((a,b)=>{ const da=parseD(a.start)||parseD(a.deadline), db=parseD(b.start)||parseD(b.deadline); if(da&&db)return da-db; if(da)return -1; if(db)return 1; return 0; }); }
function stateOf(i){ const c=frontier(); return i<c?"completed": i===c?"current": i===c+1?"next":"locked"; }

/* ---- 일정/데드라인 헬퍼 ---- */
const DAY=86400000;
function parseD(s){ if(!s)return null; const d=new Date(s+"T00:00:00"); return isNaN(d.getTime())?null:d; }
function today0(){ const t=new Date(); t.setHours(0,0,0,0); return t; }
function ddays(s){ const d=parseD(s); if(!d)return null; return Math.round((d-today0())/DAY); }
function ddLabel(dd){ if(dd==null)return""; if(dd>0)return"D-"+dd; if(dd===0)return"D-DAY"; return"D+"+(-dd); }
function planStatus(s){ const p=prog(s);
  if(p>=100) return {k:"done", t:"완료", c:"var(--gold)"};
  const dd=ddays(s.deadline);
  if(dd!=null && dd<0) return {k:"late", t:"지연", c:"#ff6b8a"};
  if(dd!=null && dd<=7) return {k:"soon", t:"임박", c:"var(--cyan)"};
  const sd=ddays(s.start);
  if(sd!=null && sd>0) return {k:"todo", t:"예정", c:"var(--muted)"};
  return {k:"wip", t:"진행중", c:"var(--green)"}; }

function renderHUD(){
  document.title=state.meta.title+" — "+state.meta.subtitle;

  const conq=S().filter(s=>prog(s)>=100).length, tot=S().length;
  const overall=tot?Math.round(S().reduce((a,s)=>a+prog(s),0)/tot):0;
  const c=frontier();
  $("#conq").textContent=conq+" / "+tot;
  $("#cur").textContent= c<tot ? (S()[c].icon+" "+S()[c].name) : "🏆 전 산업 정복";
  $("#nxt").textContent= c+1<tot ? (S()[c+1].icon+" "+S()[c+1].name) : (c<tot?"MASTER":"MASTERED");
  ov.textContent=overall+"%"; $("#ovbar").style.width=overall+"%";
}

function renderMapStairs(board,svg){

/* ---- TIMELINE (campaign schedule) ---- */
let tlYear=2026, tlCat="all", tlMonth=-1, tlMode="list", tlSelDay=null;
const TL_MON=["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
const TL_DOW=["일","월","화","수","목","금","토"];
function tlSetYear(y){ tlYear=y; tlMonth=-1; tlSelDay=null; renderTimeline(); }
function tlSetCat(c){ tlCat=c; tlMonth=-1; tlSelDay=null; renderTimeline(); }
function tlSetMonth(m){ tlMonth=m; tlSelDay=null; renderTimeline(); }
function tlSetMode(mo){ tlMode=mo; renderTimeline(); }
function tlSelectDay(d){ tlSelDay=d; renderTimeline(); }
function cleanName(x){ return String(x||"").replace(/['"\\]/g,""); }
function timelineItems(){
  const items=[];
  // 연간 = 산업 분석 기간(시작~목표)을 걸치는 모든 달에 표기
  S().forEach((s,i)=>{ const a=parseD(s.start), b=parseD(s.deadline);
    if(a&&b){ let y=a.getFullYear(), mo=a.getMonth(); const ey=b.getFullYear(), em=b.getMonth(); let guard=0;
      while((y<ey || (y===ey && mo<=em)) && guard++<60){
        const isStart=(y===a.getFullYear()&&mo===a.getMonth()), isEnd=(y===ey&&mo===em);
        const day=isStart?a.getDate():(isEnd?b.getDate():1);
        const phase=isEnd?"분석 완료 목표":(isStart?"분석 시작":"분석 진행");
        items.push({d:new Date(y,mo,day), y, m:mo, short:esc(s.name), title:`${s.icon} ${esc(s.name)} ${phase}`, cat:"연간", color:planStatus(s).c, tag:isEnd?"🎯":(isStart?"🚩":"🔷"), act:`openSector(${i},true)`});
        mo++; if(mo>11){mo=0;y++;}
      }
    } else if(b){ items.push({d:b,y:b.getFullYear(),m:b.getMonth(),short:esc(s.name),title:`${s.icon} ${esc(s.name)} 분석 완료 목표`,cat:"연간",color:planStatus(s).c,tag:"🎯",act:`openSector(${i},true)`}); }
  });
  // 월별 = 기업분석 발표(트리 자동): 기업 · 담당
  S().forEach((s,i)=>s.companies.forEach((c,ci)=>{ const d=parseD(c.deadline); if(d) items.push({d,y:d.getFullYear(),m:d.getMonth(),short:esc(c.name),title:`🏢 ${esc(c.name)} 기업분석${c.owner?" · ◈"+esc(c.owner):""}`,cat:"월별",color:coDone(c)?"var(--gold)":"var(--cyan)",tag:"🏢",act:`openSector(${i},true);setTimeout(()=>openCompany(${ci}),50)`}); }));
  // 자유 입력(추가 일정)
  (state.schedule||[]).forEach(e=>{ const d=parseD(e.date); if(!d)return; const cn=cleanName(e.company);
    const detail=`${e.company?"🏢"+esc(e.company)+" · ":""}${esc(e.title||"일정")}${e.presenter?" · ◈"+esc(e.presenter)+" 발표":""}`;
    items.push({d,y:d.getFullYear(),m:d.getMonth(),short:esc(cn||e.title||"일정"),title:detail,cat:e.cat||"월별",color:e.cat==="연간"?"var(--gold)":"var(--violet)",tag:e.cat==="연간"?"🗓":"📌",act:cn?`openCompanyByRef('${cn}')`:""}); });
  return items;
}
function renderTimeline(){
  const all=timelineItems();
  const years=[...new Set(all.map(it=>it.y))];
  const cy=new Date().getFullYear();
  const tabYears=[...new Set([...years, cy, cy+1])].sort((a,b)=>a-b);
  if(!tabYears.includes(tlYear)) tlYear = tabYears.includes(cy)?cy:tabYears[0];
  $("#tlYearTabs").innerHTML = tabYears.map(y=>`<button class="tl-yt ${y===tlYear?"on":""}" onclick="tlSetYear(${y})">${y}</button>`).join("")
    + `<div class="tl-rt"><div class="tl-modes"><button class="tl-mode ${tlMode==='list'?'on':''}" onclick="tlSetMode('list')">📋 리스트</button><button class="tl-mode ${tlMode==='cal'?'on':''}" onclick="tlSetMode('cal')">📅 캘린더</button></div>${editMode?`<button class="tl-add" onclick="addSchedYear(${tlYear})">＋ 일정</button>`:""}</div>`;
  const cats=[["all","전체"],["연간","📅 연간 전체일정"],["월별","🗓 월별 스터디"]];
  $("#tlCatTabs").innerHTML = cats.map(([k,l])=>`<button class="tl-ct ${k===tlCat?"on":""}" onclick="tlSetCat('${k}')">${l}</button>`).join("");
  const items=all.filter(it=>it.y===tlYear && (tlCat==="all"||it.cat===tlCat)).sort((a,b)=>a.d-b.d);
  const body=$("#tlBody");
  if(tlCat==="연간"){ body.innerHTML = tlTimetable(tlYear); return; }
  if(!items.length){ body.innerHTML=`<div class="tl-empty">${tlYear}년 · ${tlCat==="all"?"":(tlCat+" ")}일정이 없습니다.<div class="kk">${editMode?"＋ 일정으로 추가하거나 산업/기업 상세에서 목표일을 설정하세요":"산업·기업 상세에서 목표일을 설정하면 자동으로 나타납니다"}</div></div>`; return; }
  const months=[...new Set(items.map(it=>it.m))].sort((a,b)=>a-b);
  let fm=tlMonth;
  if(fm<0 || !months.includes(fm)) fm = (tlYear===cy && months.includes(new Date().getMonth())) ? new Date().getMonth() : months[0];
  if(tlMode==="cal") body.innerHTML = tlCalendar(items, fm);
  else body.innerHTML = (window.innerWidth<=760) ? tlMobile(items) : tlDesktop(items, fm);
}
function tlTimetable(year){
  const rows = S().map((s,i)=>{ const a=parseD(s.start), b=parseD(s.deadline); let sm=null,em=null;
    if(a&&b){ if(b.getFullYear()<year||a.getFullYear()>year) return null; sm=(a.getFullYear()<year)?0:a.getMonth(); em=(b.getFullYear()>year)?11:b.getMonth(); }

function tlDesktop(items, fm){

function tlCalendar(items, fm){
  const mobile=window.innerWidth<=760;
  const monthItems=items.filter(it=>it.m===fm);
  const prev=fm>0?fm-1:-1, next=fm<11?fm+1:-1;
  const nav=`<div class="cal-nav"><button ${prev<0?"disabled":`onclick="tlSetMonth(${prev})"`}>‹</button><div class="cal-title">${tlYear}. ${TL_MON[fm]}</div><button ${next<0?"disabled":`onclick="tlSetMonth(${next})"`}>›</button></div>`;
  const grid=calGrid(monthItems, tlYear, fm, mobile);
  let detail="";
  if(mobile){
    const day = tlSelDay || (monthItems[0]?monthItems[0].d.getDate():null);
    if(day){ const di=monthItems.filter(it=>it.d.getDate()===day);
      detail=`<div class="cal-detail"><div class="setlab">${fm+1}월 ${day}일 일정</div>${di.map(it=>`<div class="tlm-i ${it.act?"link":""}" ${it.act?`onclick="${it.act}"`:""}><div class="tlm-bar" style="background:${it.color}"></div><div class="tlm-t"><div class="tlm-title">${it.tag} ${it.title}</div><div class="tlm-cat">${it.cat}${it.act?" · 클릭 이동":""}</div></div></div>`).join("")||'<div class="empty">이 날은 일정이 없습니다</div>'}</div>`;
    }
  }
  return `${nav}${grid}${detail}`;
}
function calGrid(items, year, month, compact){
  const startDow=new Date(year,month,1).getDay(), dim=new Date(year,month+1,0).getDate();
  const byDay={}; items.filter(it=>it.m===month).forEach(it=>{ (byDay[it.d.getDate()]=byDay[it.d.getDate()]||[]).push(it); });
  const todayStr=new Date().toDateString();
  let cells="";
  for(let i=0;i<startDow;i++) cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=dim;d++){ const isT=new Date(year,month,d).toDateString()===todayStr; const evs=byDay[d]||[];
    if(compact){
      const dots=evs.slice(0,4).map(it=>`<span class="cal-dot" style="background:${it.color}"></span>`).join("");
      cells+=`<div class="cal-cell ${isT?"today":""} ${evs.length?"has":""} ${tlSelDay===d?"sel":""}" ${evs.length?`onclick="tlSelectDay(${d})"`:""}><div class="cal-d">${d}</div><div class="cal-dots">${dots}</div></div>`;
    } else {
      const chips=evs.map(it=>`<div class="cal-ev ${it.act?"link":""}" ${it.act?`onclick="${it.act}"`:""} style="border-left-color:${it.color}" title="${it.title}">${it.short}</div>`).join("");
      cells+=`<div class="cal-cell ${isT?"today":""}"><div class="cal-d">${d}</div>${chips}</div>`;
    }
  }
  const head=TL_DOW.map((d,i)=>`<div class="cal-dow ${i===0?"sun":i===6?"sat":""}">${d}</div>`).join("");
  return `<div class="cal ${compact?"compact":""}"><div class="cal-hd">${head}</div><div class="cal-grid">${cells}</div></div>`;
}

function drawChart(cv, series, base){
  if(!cv) return; const dpr=window.devicePixelRatio||1;
  const w=cv.clientWidth||600, h=220; cv.width=w*dpr; cv.height=h*dpr; cv.style.height=h+"px";
  const c=cv.getContext("2d"); c.scale(dpr,dpr); c.clearRect(0,0,w,h);
  const pts=(series||[]).slice().sort((a,b)=>a.date<b.date?-1:1);
  if(pts.length<2){ c.fillStyle="#5A6A88"; c.font="13px sans-serif"; c.textAlign="center"; c.fillText("스냅샷이 2개 이상이면 성과 그래프가 그려집니다", w/2, h/2); return; }
  const vals=pts.map(p=>p.value).concat([base]); let mn=Math.min.apply(null,vals), mx=Math.max.apply(null,vals);
  const pd=(mx-mn)*.12||mx*.02; mn-=pd; mx+=pd;
  const L=56,R=14,T=14,B=24, px=i=>L+(w-L-R)*i/(pts.length-1), py=v=>T+(h-T-B)*(1-(v-mn)/(mx-mn));
  c.strokeStyle="rgba(120,170,255,.12)"; c.lineWidth=1; c.fillStyle="#5A6A88"; c.font="10px monospace"; c.textAlign="right";
  for(let g=0;g<=3;g++){ const v=mn+(mx-mn)*g/3, y=py(v); c.beginPath(); c.moveTo(L,y); c.lineTo(w-R,y); c.stroke(); c.fillText(Math.round(v/1e6)+"M", L-6, y+3); }
  c.strokeStyle="rgba(255,198,75,.5)"; c.setLineDash([4,4]); c.beginPath(); c.moveTo(L,py(base)); c.lineTo(w-R,py(base)); c.stroke(); c.setLineDash([]);
  const last=pts[pts.length-1].value, up=last>=base;
  const grad=c.createLinearGradient(0,T,0,h-B); grad.addColorStop(0, up?"rgba(55,245,160,.28)":"rgba(255,107,138,.28)"); grad.addColorStop(1,"rgba(0,0,0,0)");
  c.beginPath(); c.moveTo(px(0),py(pts[0].value)); pts.forEach((p,i)=>c.lineTo(px(i),py(p.value))); c.lineTo(px(pts.length-1),h-B); c.lineTo(px(0),h-B); c.closePath(); c.fillStyle=grad; c.fill();
  c.beginPath(); pts.forEach((p,i)=> i?c.lineTo(px(i),py(p.value)):c.moveTo(px(i),py(p.value))); c.strokeStyle=up?"#37F5A0":"#ff6b8a"; c.lineWidth=2.4; c.lineJoin="round"; c.stroke();
  const lx=px(pts.length-1), ly=py(last); c.fillStyle=up?"#37F5A0":"#ff6b8a"; c.beginPath(); c.arc(lx,ly,4,0,6.2832); c.fill();
  c.fillStyle="#EAF1FF"; c.font="11px monospace"; c.textAlign="right"; c.fillText(won(last), lx-6, ly-8);
}

  }catch(err){ toast("불러오기 실패 — CSV 게시 URL/CORS를 확인하세요"); } }
function parseCSV(txt){ const lines=txt.trim().split(/\r?\n/); if(!lines.length)return {};
  const head=lines[0].split(",").map(s=>s.trim().toLowerCase());
  const find=(re,def)=>{ const i=head.findIndex(h=>re.test(h)); return i<0?def:i; };
  let ci=find(/code|코드|종목/,0), pi=find(/price|가격|현재가|close|종가/,1);
  const capi=find(/시총|시가총액|marketcap|market cap|cap/,-1), peri=find(/^per$|per/,-1), pbri=find(/^pbr$|pbr/,-1);
  const num=v=>{ const x=parseFloat(String(v||"").replace(/[^0-9.\-]/g,"")); return isNaN(x)?null:x; };
  const m={};
  for(let i=1;i<lines.length;i++){ const cols=lines[i].split(","); if(cols.length<2)continue;
    const code=digits(cols[ci]); if(!code)continue; const price=num(cols[pi]);
    m[code]={ price, cap: capi>=0?(cols[capi]||"").trim():null, per: peri>=0?(cols[peri]||"").trim():null, pbr: pbri>=0?(cols[pbri]||"").trim():null };
  }
  return m; }

function openCal(anchor,cur,kind,...args){ _cal={kind,args,anchor}; const d=(cur&&/^\d{4}-\d{2}-\d{2}/.test(cur))?cur:new Date().toISOString().slice(0,10);
  _calYM={y:+d.slice(0,4), m:+d.slice(5,7)-1, sel:(cur&&/^\d{4}-\d{2}-\d{2}/.test(cur))?cur:""}; renderMiniCal(); }
function calNav(dl){ let m=_calYM.m+dl, y=_calYM.y; if(m<0){m=11;y--;} if(m>11){m=0;y++;} _calYM.m=m; _calYM.y=y; renderMiniCal(); }
function calToday(){ calPick(new Date().toISOString().slice(0,10)); }
function calClear(){ calPick(""); }
function closeMiniCal(){ $("#miniCal").classList.remove("show"); _cal={}; }
function calPick(iso){ const c=_cal, A=c.args||[]; closeMiniCal();
  if(c.kind==="sched"){ schedDraft.date=iso; renderSchedForm(); }
  else if(c.kind==="coDeadline"){ setCoDeadline(A[0],A[1],iso); }
  else if(c.kind==="coItem"){ coItemF(A[0],A[1],A[2],"date",iso); renderModal(); }
  else if(c.kind==="secStart"){ setField(A[0],"start",iso); }
  else if(c.kind==="secDeadline"){ setField(A[0],"deadline",iso); }
  else if(c.kind==="pick"){ pickF(A[0],"pickDate",iso); renderPicks(); }
  else if(c.kind==="feed"){ feedF(A[0],"date",iso); renderHome(); }
  else if(c.kind==="etfIncept"){ etfF("inception",iso); }
}
function renderMiniCal(){ const el=$("#miniCal"), {y,m,sel}=_calYM; const first=new Date(y,m,1).getDay(), dim=new Date(y,m+1,0).getDate(), todayIso=new Date().toISOString().slice(0,10);
  let cells=""; for(let i=0;i<first;i++)cells+=`<span class="mc-e"></span>`;
  for(let d=1;d<=dim;d++){ const iso=`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`; cells+=`<span class="mc-day ${iso===sel?"sel":""} ${iso===todayIso?"today":""}" onclick="calPick('${iso}')">${d}</span>`; }
  el.innerHTML=`<div class="mc-hd"><button type="button" onclick="calNav(-1)">‹</button><div class="mc-ttl">${y}. ${_MON[m]}</div><button type="button" onclick="calNav(1)">›</button></div>
    <div class="mc-dow">${_DOW.map((x,i)=>`<span class="${i===0?"sun":i===6?"sat":""}">${x}</span>`).join("")}</div>
    <div class="mc-grid">${cells}</div>
    <div class="mc-foot"><button type="button" onclick="calToday()">오늘</button><button type="button" onclick="calClear()">비우기</button></div>`;
  el.classList.add("show");
  const r=_cal.anchor.getBoundingClientRect(), ew=el.offsetWidth, eh=el.offsetHeight;
  let left=r.left, top=r.bottom+6; if(left+ew>innerWidth-8)left=innerWidth-ew-8; if(left<8)left=8; if(top+eh>innerHeight-8)top=r.top-eh-6; if(top<8)top=8;
  el.style.left=left+"px"; el.style.top=top+"px";
}
function dpick(cur,kind,...args){ const a=args.map(x=>typeof x==="string"?`'${x}'`:x).join(","); return `<button type="button" class="datepick" onclick="openCal(this,'${cur||""}','${kind}'${a?","+a:""})">${cur||"📅 선택"}</button>`; }
document.addEventListener("click",e=>{ const el=$("#miniCal"); if(el&&el.classList.contains("show") && !el.contains(e.target) && e.target!==_cal.anchor && !(_cal.anchor&&_cal.anchor.contains&&_cal.anchor.contains(e.target))) closeMiniCal(); }, true);
window.addEventListener("scroll",()=>{ const el=$("#miniCal"); if(el&&el.classList.contains("show"))closeMiniCal(); }, true);
function addSched(){ if(!requireWrite())return; openSchedForm(-1); }
function delSched(i){ state.schedule.splice(i,1); save(); renderHome(); }
function schedCatToggle(i){ state.schedule[i].cat = state.schedule[i].cat==="연간"?"월별":"연간"; save(); renderHome(); }

/* ============================================================================
   📋 게시판
   ============================================================================ */
const catMeta={"공지":{i:"📢",c:"var(--gold)"},"개선요청":{i:"🛠",c:"var(--cyan)"},"자유":{i:"💬",c:"var(--violet)"}};
let boardCat="all", boardView={mode:"list",id:null}, boardDraft=null;
function boardSetCat(c){ boardCat=c; boardView={mode:"list"}; renderBoard(); }
function boardOpen(id){ boardView={mode:"detail",id}; renderBoard(); }
function boardBack(){ boardView={mode:"list"}; renderBoard(); }
function renderBoard(){
  const el=$("#board");
  if(boardView.mode==="compose" && boardDraft){ el.innerHTML=boardComposeHTML(); return; }
  if(boardView.mode==="detail"){ const p=(state.board||[]).find(x=>x.id===boardView.id); if(p){ el.innerHTML=boardPostHTML(p); return; } boardView={mode:"list"}; }
  el.innerHTML=boardListHTML();
}
function boardListHTML(){
  const cats=[["all","전체"],["공지","📢 공지"],["개선요청","🛠 개선요청"],["자유","💬 자유"]];
  const catTabs=cats.map(([k,l])=>`<button class="bd-ct ${k===boardCat?"on":""}" onclick="boardSetCat('${k}')">${l}</button>`).join("");
  const posts=(state.board||[]).filter(p=>boardCat==="all"||p.cat===boardCat).slice().sort((a,b)=>(b.pinned-a.pinned)||(a.date<b.date?1:-1));
  const rows=posts.map(p=>{ const cm=catMeta[p.cat]||catMeta["자유"];
    return `<div class="bd-row" onclick="boardOpen('${p.id}')">
      ${p.pinned?'<span class="bd-pin">📌</span>':''}
      <span class="bd-badge" style="color:${cm.c};border-color:${cm.c}">${cm.i} ${p.cat}</span>
      <span class="bd-title">${esc(p.title)}</span>
      ${(p.links&&p.links.length)?'<span class="bd-clip">📎</span>':''}
      <span class="bd-cmt">💬 ${(p.comments||[]).length}</span>
      <span class="bd-rmeta">◈ ${esc(p.author)} · ${esc(p.date)}</span></div>`;}).join("")
    || `<div class="empty" style="text-align:center;padding:40px">글이 없습니다. 첫 글을 남겨보세요!</div>`;
  return `<div class="panel">
    <div class="phead"><div><div class="ptitle">📋 게시판</div><div class="psub">공지 · 개선요청 · 자유글 · 자료 링크 첨부</div></div>
      <div class="pbtns"><button class="tbtn" onclick="boardCompose()">✏️ 글쓰기</button></div></div>
    <div class="bd-cats">${catTabs}</div>
    <div class="bd-list">${rows}</div></div>`;
}
function boardCompose(){ if(!requireWrite())return; boardDraft={cat:"자유",title:"",author:"",body:"",links:[]}; boardView={mode:"compose"}; renderBoard(); }
function boardComposeHTML(){
  const d=boardDraft;
  const catBtns=["공지","개선요청","자유"].map(c=>`<button class="bd-catsel ${d.cat===c?"on":""}" onclick="boardDraftF('cat','${c}')">${catMeta[c].i} ${c}</button>`).join("");
  const links=d.links.map((l,i)=>`<a class="lchip" href="${esc(l.url)}" target="_blank" rel="noopener">📎 ${esc(l.label||"자료")} <span class="del" onclick="event.preventDefault();boardDraftDelLink(${i})">✕</span></a>`).join("");
  return `<div class="panel">
    <div class="phead"><div class="ptitle">✏️ 새 글 작성</div><div class="pbtns"><button class="tbtn" onclick="boardBack()">← 취소</button></div></div>
    <div class="bd-form">
      <div class="setlab">분류</div><div class="bd-catrow">${catBtns}</div>
      <input class="bd-in" placeholder="제목" value="${esc(d.title)}" oninput="boardDraftF('title',this.value)">
      <input class="bd-in" placeholder="작성자 이름" value="${esc(d.author)}" oninput="boardDraftF('author',this.value)">
      <textarea class="bd-ta" placeholder="내용을 입력하세요..." oninput="boardDraft.body=this.value">${esc(d.body)}</textarea>
      <div class="setlab" style="margin-top:6px">첨부 자료 (링크)</div>
      <div class="links">${links||'<span class="empty">첨부된 링크 없음</span>'}</div>
      <button class="miniadd" style="margin-top:10px" onclick="boardDraftAddLink()">＋ 링크 첨부 (구글드라이브·노션·PDF)</button>
      <div class="m-actions"><button class="btn primary" onclick="boardSubmit()">등록</button></div>
    </div></div>`;
}
function boardDraftF(k,v){ boardDraft[k]=v; if(k==="cat")renderBoard(); }
function boardDraftAddLink(){ const label=prompt("자료 이름:"); if(!label)return; const url=prompt("링크 URL:","https://"); if(!url)return; boardDraft.links.push({label:label.trim(),url:url.trim()}); renderBoard(); }
function boardDraftDelLink(i){ boardDraft.links.splice(i,1); renderBoard(); }
function boardSubmit(){ const ta=$("#board .bd-ta"); if(ta)boardDraft.body=ta.value; if(!boardDraft.title.trim()){ toast("제목을 입력하세요"); return; }
  state.board.unshift({id:"p"+Date.now().toString(36), cat:boardDraft.cat, title:boardDraft.title.trim(), author:(boardDraft.author||"익명").trim()||"익명", date:new Date().toISOString().slice(0,10), pinned:false, body:boardDraft.body, links:boardDraft.links, comments:[]});
  save(); boardDraft=null; boardView={mode:"list"}; renderBoard(); toast("📋 글이 등록되었습니다"); }
function boardPostHTML(p){
  const cm=catMeta[p.cat]||catMeta["자유"];
  const links=(p.links||[]).map(l=>`<a class="lchip" href="${esc(l.url)}" target="_blank" rel="noopener">📎 ${esc(l.label||"자료")} ↗</a>`).join("");
  const comments=(p.comments||[]).map((c,i)=>`<div class="bd-cm"><div class="bd-cm-h"><b>◈ ${esc(c.author||"익명")}</b><span>${esc(c.date)}</span>${editMode?`<span class="del" onclick="boardDelComment('${p.id}',${i})">🗑</span>`:""}</div><div class="bd-cm-t">${esc(c.text)}</div></div>`).join("")||'<div class="empty">아직 댓글이 없습니다. 첫 댓글을 남겨보세요!</div>';
  return `<div class="panel">
    <div class="phead"><div class="pbtns"><button class="tbtn" onclick="boardBack()">← 목록</button></div>
      ${editMode?`<div class="pbtns"><button class="tbtn" onclick="boardPin('${p.id}')">${p.pinned?"📌 고정 해제":"📌 상단 고정"}</button><button class="tbtn" style="color:#ff8fae" onclick="boardDel('${p.id}')">🗑 삭제</button></div>`:""}</div>
    <div class="bd-post">
      <div class="bd-badge lg" style="color:${cm.c};border-color:${cm.c}">${cm.i} ${p.cat}</div>
      <h2 class="bd-h">${p.pinned?"📌 ":""}${esc(p.title)}</h2>
      <div class="bd-pmeta">◈ ${esc(p.author)} · ${esc(p.date)}</div>
      <div class="bd-body">${esc(p.body).replace(/\n/g,"<br>")}</div>
      ${links?`<div class="bd-att"><div class="setlab">📎 첨부 자료</div><div class="links">${links}</div></div>`:""}
      <div class="bd-cmwrap"><div class="setlab">💬 댓글 ${(p.comments||[]).length}</div>
        <div class="bd-cmlist">${comments}</div>
        <div class="bd-cmform"><input class="bd-in sm" id="cmAuthor" placeholder="이름"><input class="bd-in" id="cmText" placeholder="댓글 달기..." onkeydown="if(event.key==='Enter')boardAddComment('${p.id}')"><button class="btn primary" style="flex:none;min-width:82px" onclick="boardAddComment('${p.id}')">등록</button></div>
      </div></div></div>`;
}
function boardAddComment(id){ if(!requireWrite())return; const p=state.board.find(x=>x.id===id); if(!p)return; const a=($("#cmAuthor").value||"익명").trim()||"익명"; const t=$("#cmText").value.trim(); if(!t){ toast("댓글 내용을 입력하세요"); return; } p.comments.push({author:a,date:new Date().toISOString().slice(0,10),text:t}); save(); renderBoard(); }
function boardDelComment(id,i){ const p=state.board.find(x=>x.id===id); if(p){ p.comments.splice(i,1); save(); renderBoard(); } }
function boardPin(id){ const p=state.board.find(x=>x.id===id); if(p){ p.pinned=!p.pinned; save(); renderBoard(); } }
function boardDel(id){ if(confirm("이 글을 삭제할까요?")){ state.board=state.board.filter(x=>x.id!==id); save(); boardView={mode:"list"}; renderBoard(); } }

/* ============================================================================
   👥 스터디원 소개
   ============================================================================ */
let memberView={mode:"list",id:null}, memberDraft=null; const memUnlocked=new Set();
function canEditMember(m){ return editMode || !m.pw || memUnlocked.has(m.id); }
function renderMembers(){ const el=$("#members"); if(memberView.mode==="edit"&&memberDraft){ el.innerHTML=memberFormHTML(); return; } el.innerHTML=memberListHTML(); }
function memberListHTML(){
  const cards=(state.members||[]).map(m=>`<div class="mcard">
    <div class="m-top2"><div class="m-ava">${esc((m.name||"?").slice(0,1))}</div>
      <div style="flex:1;min-width:0"><div class="m-name">${esc(m.name||"이름")}${m.age?` <span class="m-age">${esc(m.age)}세</span>`:""}${m.pw?' <span class="colock">🔒</span>':""}</div>
        <div class="m-cover">🏭 ${esc(m.cover||"—")}</div></div>
      <div class="m-acts"><span onclick="memberEdit('${m.id}')" title="수정">✎</span><span onclick="memberDel('${m.id}')" title="삭제">🗑</span></div></div>
    <div class="m-rows">
      ${m.exp?`<div><b>투자경력</b><span>${esc(m.exp)}</span></div>`:""}
      ${m.job?`<div><b>직업</b><span>${esc(m.job)}</span></div>`:""}</div>
    ${m.strength?`<div class="m-strength">“${esc(m.strength)}”</div>`:""}
  </div>`).join("") || `<div class="empty" style="text-align:center;padding:40px">아직 소개가 없습니다. 첫 소개를 남겨보세요!</div>`;
  return `<div class="panel">
    <div class="phead"><div><div class="ptitle">👥 스터디원 소개</div><div class="psub">본인 정보를 등록하세요 · 🔒 비밀번호로 본인만 수정</div></div>
      <div class="pbtns"><button class="tbtn" onclick="memberAdd()">＋ 나 소개하기</button></div></div>
    <div class="mgrid">${cards}</div></div>`;
}
function memberAdd(){ if(!requireWrite())return; memberDraft={id:"m"+Date.now().toString(36),name:"",age:"",exp:"",job:"",cover:"",strength:"",pw:"",_new:true}; memberView={mode:"edit"}; renderMembers(); }
function memberEdit(id){ const m=(state.members||[]).find(x=>x.id===id); if(!m)return;
  if(!canEditMember(m)){ const inp=prompt(`'${m.name}' 수정 비밀번호:`); if(inp!==m.pw){ if(inp!=null)toast("비밀번호가 올바르지 않습니다"); return; } memUnlocked.add(id); }
  memberDraft=Object.assign({},m); memberView={mode:"edit",id}; renderMembers(); }
function memberFormHTML(){ const d=memberDraft;
  return `<div class="panel">
    <div class="phead"><div class="ptitle">${d._new?"＋ 나 소개하기":"✎ 소개 수정"}</div><div class="pbtns"><button class="tbtn" onclick="memberCancel()">← 취소</button></div></div>
    <div class="mform">
      <div class="mf-grid">
        <label class="mf"><span>닉네임</span><input class="mf-in" value="${esc(d.name)}" placeholder="스톰" oninput="memberDraft.name=this.value"></label>
        <label class="mf"><span>나이</span><input class="mf-in" value="${esc(d.age)}" placeholder="34" oninput="memberDraft.age=this.value"></label>
        <label class="mf"><span>투자경력</span><input class="mf-in" value="${esc(d.exp)}" placeholder="6년" oninput="memberDraft.exp=this.value"></label>
        <label class="mf"><span>직업</span><input class="mf-in" value="${esc(d.job)}" placeholder="한전 10년차" oninput="memberDraft.job=this.value"></label>
        <label class="mf wide"><span>주요 커버 산업</span><input class="mf-in" value="${esc(d.cover)}" placeholder="전력산업" oninput="memberDraft.cover=this.value"></label>
        <label class="mf wide"><span>강점 / 한마디</span><textarea class="mf-ta" placeholder="나의 강점, 공유할 수 있는 것" oninput="memberDraft.strength=this.value">${esc(d.strength)}</textarea></label>
        <label class="mf wide"><span>🔒 수정 비밀번호 (선택 · 본인만 수정/삭제)</span><input class="mf-in" value="${esc(d.pw||'')}" placeholder="비우면 잠금 없음" oninput="memberDraft.pw=this.value"></label>
      </div>
      <div class="mf-actions"><button class="btn primary" onclick="memberSave()">저장</button></div>
    </div></div>`;
}
function memberSave(){ if(!memberDraft.name.trim()){ toast("닉네임을 입력하세요"); return; } const arr=state.members; const i=arr.findIndex(x=>x.id===memberDraft.id); const rec=Object.assign({},memberDraft); delete rec._new; if(i>=0)arr[i]=rec; else arr.push(rec); if(rec.pw)memUnlocked.add(rec.id); save(); memberDraft=null; memberView={mode:"list"}; renderMembers(); toast("👥 소개가 저장되었습니다"); }
function memberCancel(){ memberDraft=null; memberView={mode:"list"}; renderMembers(); }
function memberDel(id){ const m=(state.members||[]).find(x=>x.id===id); if(!m)return;
  if(!canEditMember(m)){ const inp=prompt(`'${m.name}' 삭제 비밀번호:`); if(inp!==m.pw){ if(inp!=null)toast("비밀번호가 올바르지 않습니다"); return; } }
  if(confirm("이 소개를 삭제할까요?")){ state.members=(state.members||[]).filter(x=>x.id!==id); save(); renderMembers(); } }

/* init */
renderHUD(); setView('home');
</script>
</body>
</html>
